<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>My ChatGPT Clone</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; padding: 20px; gap: 20px; }
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .chat-container { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }
        #chat-box { border: 1px solid #ccc; height: 500px; overflow-y: auto; padding: 10px; }
        .message { margin-bottom: 10px; padding: 10px; border-radius: 8px; line-height: 1.4; }
        .user-msg { background-color: #e3f2fd; text-align: left; margin-left: 20%; }
        .model-msg { background-color: #f5f5f5; text-align: left; margin-right: 20%; }
        
        #user-input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <div class="sidebar">
        <label>挑選 LLM 模型：
            <select id="model-select">
                <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash (預設推薦)</option>
                <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-lite (輕量極速版)</option>
            </select>
        </label>
        
        <label>System Prompt：
            <textarea id="system-prompt" rows="4" placeholder="設定 AI 角色..."></textarea>
        </label>
        
        <label>Temperature (<span id="temp-val">0.7</span>)：
            <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('temp-val').innerText=this.value">
        </label>
    </div>

    <div class="chat-container">
        <div id="chat-box"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="user-input" style="flex-grow: 1;" placeholder="輸入訊息... (按 Enter 發送)">
            <button onclick="sendMessage()">發送</button>
        </div>
    </div>

    <script>
        let chatHistory = []; 

        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            appendMessage('user', message);
            inputField.value = '';

            const recentHistory = chatHistory.slice(-15);

            const payload = {
                model: document.getElementById('model-select').value,
                system_prompt: document.getElementById('system-prompt').value,
                temperature: parseFloat(document.getElementById('temperature').value),
                history: recentHistory,
                message: message
            };

            const modelMsgDiv = appendMessage('model', '');
            let fullModelResponse = "";

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunkText = decoder.decode(value, { stream: true });
                    fullModelResponse += chunkText;
                    modelMsgDiv.innerText = fullModelResponse;
                }

                chatHistory.push({ role: "user", text: message });
                chatHistory.push({ role: "model", text: fullModelResponse });

            } catch (error) {
                modelMsgDiv.innerText = "連線發生錯誤，請確認後端伺服器是否開啟。";
            }
        }

        function appendMessage(role, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = role === 'user' ? 'message user-msg' : 'message model-msg';
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
